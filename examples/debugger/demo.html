<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>qjs-lws debugger demo</title>
<style>
  html, body { height: 100%; overflow: hidden; }
  body { font: 14px/1.4 system-ui, sans-serif; margin: 1rem; display: flex; flex-direction: column; }
  #status { color: #888; font-style: italic; margin-bottom: 0.5rem; }
  #toolbar button { margin-right: 0.25rem; margin-bottom: 0.5rem; }
  #panes { display: flex; gap: 1rem; flex: 1; min-height: 0; }
  #sourceCol, #varsCol { min-width: 0; overflow-y: auto; }
  #sourceCol { flex: 2; }
  #varsCol { flex: 1; display: flex; flex-direction: column; gap: 1rem; }
  #source { border: 1px solid #ccc; padding: 0.5rem; overflow: auto; max-height: 32rem; }
  #source div { white-space: pre; font-family: monospace; }
  #source .line-no { display: inline-block; width: 2.5rem; color: #999; user-select: none; cursor: pointer; }
  #source .current { background: #ffe58f; }
  #source .breakpoint .line-no { background: #d9363e; color: #fff; border-radius: 50%; }
  #source .tok-comment { color: #8a8a8a; font-style: italic; }
  #source .tok-string { color: #a31515; }
  #source .tok-regex { color: #af00db; }
  #source .tok-numeric { color: #098658; }
  #source .tok-keyword { color: #0000ff; }
  #vars { border: 1px solid #ccc; padding: 0.5rem; overflow: auto; max-height: 32rem; font-family: monospace; }
  #vars .scope { font-weight: bold; margin-top: 0.5rem; }
  #output { border: 1px solid #ccc; background: #1e1e1e; color: #ddd; font-family: monospace; white-space: pre-wrap; padding: 0.5rem; max-height: 12rem; overflow: auto; margin-top: 1rem; }
  #output .stderr { color: #ff6b6b; }
  #evalPane { margin-top: auto; }
  #evalPane input { font-family: monospace; width: 100%; box-sizing: border-box; }
  #evalResult { font-family: monospace; margin-top: 0.25rem; min-height: 1.2em; }
</style>
</head>
<body>
<h1>qjs-lws debugger demo</h1>
<div id="status">connecting…</div>
<div id="toolbar">
  <button id="continue">Continue</button>
  <button id="next">Step Over</button>
  <button id="stepIn">Step In</button>
  <button id="stepOut">Step Out</button>
  <button id="pause">Pause</button>
</div>
<div id="panes">
  <div id="sourceCol">
    <div id="source">(waiting for a paused debug target…)</div>
    <h2>Program Output</h2>
    <div id="output"></div>
  </div>
  <div id="varsCol">
    <div id="vars"></div>
    <div id="evalPane">
      <h2>Evaluate</h2>
      <input id="evalInput" placeholder="expression, Enter to run">
      <button id="evalRun">Run</button>
      <div id="evalResult"></div>
    </div>
  </div>
</div>
<script src="demo.js"></script>
</body>
</html>
