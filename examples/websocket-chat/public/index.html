<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>qjs-lws chat</title>
<style>
  body { font: 14px system-ui, sans-serif; max-width: 32rem; margin: 2rem auto; padding: 0 1rem; }
  #log { border: 1px solid #ccc; height: 16rem; overflow-y: auto; padding: 0.5rem; margin-bottom: 0.5rem; }
  #log div { margin: 0.15rem 0; }
  #log .status { color: #888; font-style: italic; }
  form { display: flex; gap: 0.5rem; }
  #text { flex: 1; }
</style>
</head>
<body>
<h1>qjs-lws chat</h1>
<div id="log"></div>
<form id="form">
  <input id="text" autocomplete="off" placeholder="Say something…">
  <button type="submit">Send</button>
</form>

<script>
  const log = document.getElementById('log');
  const form = document.getElementById('form');
  const text = document.getElementById('text');

  function line(msg, className) {
    const div = document.createElement('div');
    if(className) div.className = className;
    div.textContent = msg;
    log.appendChild(div);
    log.scrollTop = log.scrollHeight;
  }

  const ws = new WebSocket(`ws://${location.host}/ws`, 'chat');

  ws.onopen = () => line('connected', 'status');
  ws.onclose = () => line('disconnected', 'status');
  ws.onerror = () => line('connection error', 'status');
  ws.onmessage = (event) => line(event.data);

  form.addEventListener('submit', (event) => {
    event.preventDefault();
    if(!text.value || ws.readyState !== WebSocket.OPEN) return;
    ws.send(text.value);
    text.value = '';
  });
</script>
</body>
</html>
